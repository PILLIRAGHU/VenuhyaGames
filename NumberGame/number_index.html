<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random Number Game</title>
    <link rel="stylesheet" href="number_style.css">
</head>
<body>

<h1>Venuhya Number Game</h1>

<div class="controls">
    <input type="number" id="secondsInput" placeholder="Seconds" min="1">
    <button class="start" id="startBtn">Start</button>
    <button class="pause" id="pauseBtn">Pause</button>
    <button class="reset" id="resetBtn">Reset</button>
</div>

<div id="timer">Time: 0</div>
<div id="status">Click Start to play</div>

<div class="grid" id="grid"></div>

<script src="number_script.js"></script>
</body>
</html>
